<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BloodBridge - Register</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="auth-page">

    <div class="auth-container">
        <div class="auth-header">
            <div class="auth-logo">BloodBridge</div>
            <h2>Create Your Account</h2>
            <p>Join the network and help save lives nearby.</p>
        </div>

        <form class="auth-form" id="registerForm">
            <div class="form-group">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" placeholder="John Doe" required>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="name@example.com" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="bloodType">Blood Type</label>
                    <select id="bloodType" required>
                        <option value="" disabled selected>Select</option>
                        <option value="A+">A+</option>
                        <option value="A-">A-</option>
                        <option value="B+">B+</option>
                        <option value="B-">B-</option>
                        <option value="AB+">AB+</option>
                        <option value="AB-">AB-</option>
                        <option value="O+">O+</option>
                        <option value="O-">O-</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="role">I want to register as a:</label>
                    <select id="role" required>
                        <option value="" disabled selected>Select role</option>
                        <option value="donor">Donor (Give Blood)</option>
                        <option value="patient">Patient / Hospital (Request Blood)</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-auth">Register</button>
        </form>

        <div class="auth-footer">
            <p>Already have an account? <a href="#login">Log In</a></p>
        </div>
    </div>

</body>
</html>
